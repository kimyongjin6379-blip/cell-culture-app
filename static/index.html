<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cell Culture Analysis Tool</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- ── Left panel ─────────────────────────────────────────── -->
    <aside class="left-panel">
      <div class="logo-area">
        <h1>Cell Culture<br>Analysis Tool</h1>
        <p class="subtitle">세포 배양 데이터 자동 분석</p>
      </div>

      <form id="upload-form">
        <!-- File upload -->
        <section class="form-section">
          <h2>1. 파일 업로드</h2>
          <div id="drop-zone" class="drop-zone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 16V4m0 0L8 8m4-4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round"/>
            </svg>
            <p>Raw VCD + Raw Titer 시트가 포함된<br>Excel 파일을 드래그하거나 클릭하여 업로드</p>
            <span class="file-hint">.xlsx 형식</span>
            <input type="file" id="file-input" accept=".xlsx,.xls" hidden />
          </div>
          <div id="file-name" class="file-name hidden"></div>
        </section>

        <!-- Media info -->
        <section class="form-section">
          <h2>2. 배지 정보 (선택)</h2>
          <label class="field-label">Basal Media</label>
          <input type="text" id="basal-media" class="text-input"
                 placeholder="예) CD CHO + 6mM L-Glutamine" />
          <label class="field-label">Feed Media (쉼표 구분, 비우면 자동)</label>
          <input type="text" id="feed-media" class="text-input"
                 placeholder="예) SOY-BIO 1, SOY-BIO 2, IMDM" />
        </section>

        <!-- Display options -->
        <section class="form-section">
          <h2>3. 표시 옵션</h2>
          <label class="toggle-label">
            <span>평균 ± SD 표시</span>
            <label class="switch">
              <input type="checkbox" id="show-mean" checked />
              <span class="slider"></span>
            </label>
          </label>
          <p class="hint">OFF 시 개별 반복 실험값을 모두 표시합니다.</p>
        </section>

        <!-- Submit -->
        <button type="submit" id="submit-btn" class="btn-primary" disabled>
          <span id="btn-text">분석 시작</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <!-- Info box (shown after analysis) -->
      <div id="info-box" class="info-box hidden">
        <div class="info-row"><span class="info-key">세포주</span><span id="info-cell-line" class="info-val">—</span></div>
        <div class="info-row"><span class="info-key">배양 방식</span><span id="info-culture-mode" class="info-val">—</span></div>
        <div class="info-row"><span class="info-key">Feeding 일자</span><span id="info-feeding" class="info-val">—</span></div>
        <div class="info-row"><span class="info-key">분석 지표</span><span id="info-sections" class="info-val">—</span></div>
      </div>

      <button id="download-btn" class="btn-secondary hidden">
        ⬇ Excel 결과 다운로드
      </button>
    </aside>

    <!-- ── Right panel ────────────────────────────────────────── -->
    <main class="right-panel">
      <div id="placeholder" class="placeholder">
        <svg viewBox="0 0 80 80" fill="none">
          <circle cx="40" cy="40" r="38" stroke="#2E75B6" stroke-width="2" opacity="0.3"/>
          <path d="M20 55 Q30 30 40 38 Q50 46 60 25" stroke="#2E75B6" stroke-width="2.5"
                stroke-linecap="round" fill="none" opacity="0.6"/>
          <circle cx="40" cy="38" r="3" fill="#2E75B6" opacity="0.5"/>
        </svg>
        <p>파일을 업로드하고 분석을 시작하면<br>그래프가 여기에 표시됩니다.</p>
      </div>

      <!-- Tab navigation -->
      <div id="tab-bar" class="tab-bar hidden"></div>

      <!-- Chart panels (one per section) -->
      <div id="charts-container" class="charts-container hidden"></div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
